syntax = "proto3";

package repo;

option go_package = "github.com/accretional/proto-repo/genpb";

// GithubRepo identifies a repository on GitHub.
message GithubRepo {
  string owner = 1;
  string name = 2;
}

message RepoSource {
  oneof source {
    string uri = 1;
    GithubRepo gh = 2;
  }
}

// Repo identifies a source code repository from any supported host.
message Repo {
  RepoSource source = 1;
  string branch = 2;
  string commit = 3;
}

// RepoList is a collection of repositories.
message RepoList {
  repeated Repo repos = 1;
}

service Importer {
  // Local URI by default
  rpc Download(RepoList) returns (RepoSource);
}
