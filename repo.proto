syntax = "proto3";

package repo;

option go_package = "github.com/accretional/proto-repo/genpb";

// GithubRepo identifies a repository on GitHub.
message GithubRepo {
  string owner = 1;
  string name = 2;
}

// GithubOwner identifies a GitHub user or organization login. As a RepoSource
// it's a request for every repo under that owner; the Importer expands it
// server-side by calling the GitHub API before any clone/pull happens.
// Callers who just want "all repos for <name>" can leave options unset.
message GithubOwner {
  string owner = 1;
  GithubOptions options = 2;
}

// GithubOptions filter which repos a GithubOwner expands to. Both flags
// default to excluded — typical callers want neither forks nor archived
// projects in their set.
message GithubOptions {
  bool include_forks = 1;
  bool include_archived = 2;
}

message RepoSource {
  oneof source {
    string uri = 1;
    GithubRepo gh = 2;
    RepoPath path = 3;
    GithubOwner gh_owner = 4;
  }
}

// Repo identifies a source code repository from any supported host.
message Repo {
  RepoSource source = 1;
  string branch = 2;
  string commit = 3;
}

// RepoList is a collection of repositories.
message RepoList {
  repeated Repo repos = 1;
}

message RepoPath {
  string path = 1;
}

message RepoLogs {
  repeated string line = 1;
}

message RepoMsg {
  Repo repo = 1;
  RepoLogs stdout = 2;
  RepoLogs stderr = 3;
  repeated string errs = 4;
}

message MultiRepoZip {
  RepoList repos = 1;
  string path = 2;
  sint64 size = 3;
  int32 num_files = 4;
}

service Importer {
  // Local URI by default
  rpc Download(RepoList) returns (stream RepoMsg);
  rpc Clone(RepoList) returns (stream RepoMsg);
  rpc Where(RepoList) returns (stream RepoPath);
  rpc Pull(RepoList) returns(stream RepoMsg);
  rpc Zip(RepoList) returns(MultiRepoZip);
}
